name: npi_si

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0.33
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3311:3306"
    environment:
      MYSQL_ROOT_PASSWORD: si_root_dev
      MYSQL_DATABASE: npi_si_dev
      MYSQL_USER: npi_si
      MYSQL_PASSWORD: si_dev_pass
    volumes:
      - npi_si_dbdata:/var/lib/mysql

volumes:
  npi_si_dbdata:
